<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>容量換算大挑戰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f0f9ff; }
        .option-btn { transition: all 0.2s; }
        .option-btn:hover { transform: translateY(-2px); }
        .correct { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #166534; }
        .wrong { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b; }
        .option-prefix { 
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            background-color: #e2e8f0;
            border-radius: 50%;
            margin-right: 12px;
            font-weight: bold;
            font-size: 0.875rem;
            color: #475569;
            flex-shrink: 0;
        }
        .correct .option-prefix { background-color: #22c55e; color: white; }
        .wrong .option-prefix { background-color: #ef4444; color: white; }
        
        /* 頁面切換動畫 */
        .page { transition: opacity 0.3s ease-in-out; }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="game-container" class="w-full max-w-2xl bg-white rounded-3xl shadow-xl overflow-hidden">
        
        <!-- Start Page -->
        <div id="start-page" class="page p-12 text-center">
            <div class="py-16">
                <div class="mb-12">
                    <span class="bg-blue-100 text-blue-600 px-4 py-1 rounded-full text-sm font-bold uppercase tracking-wider">複習</span>
                    <h1 class="text-3xl font-black text-gray-800 mt-6 mb-2">三下數學 2-3</h1>
                    <h2 class="text-2xl font-bold text-blue-600">容量的換算與比較</h2>
                </div>
                <button id="start-btn" class="w-full sm:w-64 bg-blue-600 text-white text-xl py-4 rounded-2xl font-black hover:bg-blue-700 shadow-lg shadow-blue-200 transform transition active:scale-95">
                    開始遊戲
                </button>
            </div>
        </div>

        <!-- Quiz Content Page (Initially Hidden) -->
        <div id="quiz-page" class="page hidden">
            <!-- Header -->
            <div class="bg-blue-600 p-6 text-white text-center">
                <h1 class="text-xl font-bold">容量換算大挑戰</h1>
            </div>

            <!-- Progress Bar -->
            <div class="w-full bg-gray-200 h-2">
                <div id="progress-bar" class="bg-yellow-400 h-2 transition-all duration-500" style="width: 0%"></div>
            </div>

            <div id="quiz-box" class="p-8">
                <div class="flex justify-between items-center mb-6">
                    <span id="question-number" class="text-blue-600 font-bold text-lg">第 1 題 / 5</span>
                    <span id="score-display" class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-sm font-medium">得分: 0</span>
                </div>

                <h2 id="question-text" class="text-xl text-gray-800 font-bold mb-8 leading-relaxed">題目載入中...</h2>

                <div id="options-container" class="grid grid-cols-1 gap-4">
                    <!-- 選項 -->
                </div>

                <div id="feedback" class="mt-6 p-4 rounded-xl hidden">
                    <p id="feedback-text" class="font-medium"></p>
                    <p id="rationale-text" class="text-sm mt-1 leading-relaxed"></p>
                    <button id="next-btn" class="mt-4 w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition">下一題</button>
                </div>
            </div>
        </div>

        <!-- Result Screen (Initially Hidden) -->
        <div id="result-screen" class="page p-8 text-center hidden">
            <div class="mb-6">
                <div class="inline-block p-6 bg-yellow-100 rounded-full mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-yellow-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <h2 class="text-3xl font-bold text-gray-800">測驗完成！</h2>
                <p id="final-score" class="text-5xl font-black text-blue-600 my-6">0 / 100</p>
                <p id="result-message" class="text-gray-600 mb-8 font-medium"></p>
                <button id="restart-btn" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-700 transition">再玩一次</button>
            </div>
        </div>
    </div>

    <script>
        // 固定題庫數據
        const quizData = {
            "questions": [
                {
                    "question": "【第一題】1 公升等於多少毫升？",
                    "options": [
                        { "text": "10 毫升", "rationale": "不對喔。1 公升 = 1000 毫升。", "isCorrect": false },
                        { "text": "100 毫升", "rationale": "不對喔。1 公升 = 1000 毫升。", "isCorrect": false },
                        { "text": "1000 毫升", "rationale": "正確！請記住：1 公升 = 1000 毫升。", "isCorrect": true },
                        { "text": "10000 毫升", "rationale": "不對喔。1 公升 = 1000 毫升。", "isCorrect": false }
                    ]
                },
                {
                    "question": "【第二題】5 公升等於多少毫升？",
                    "options": [
                        { "text": "5000 毫升", "rationale": "正確！5 公升 = 5000 毫升。", "isCorrect": true },
                        { "text": "500 毫升", "rationale": "不對喔。5 公升 = 5000 毫升。", "isCorrect": false },
                        { "text": "50 毫升", "rationale": "不對喔。5 公升 = 5000 毫升。", "isCorrect": false },
                        { "text": "50000 毫升", "rationale": "不對喔。5 公升 = 5000 毫升。", "isCorrect": false }
                    ]
                },
                {
                    "question": "【第三題】3 公升 400 毫升等於多少毫升？",
                    "options": [
                        { "text": "340 毫升", "rationale": "不對喔。3公升＝3000毫升，3000+400=3400（毫升）", "isCorrect": false },
                        { "text": "3040 毫升", "rationale": "不對喔。3公升＝3000毫升，3000+400=3400（毫升）", "isCorrect": false },
                        { "text": "3400 毫升", "rationale": "正確！3公升＝3000毫升，3000+400=3400（毫升）", "isCorrect": true },
                        { "text": "30040 毫升", "rationale": "不對喔。3公升＝3000毫升，3000+400=3400（毫升）", "isCorrect": false }
                    ]
                },
                {
                    "question": "【第四題】7 公升 20 毫升等於多少毫升？",
                    "options": [
                        { "text": "720 毫升", "rationale": "不對喔。7公升＝7000毫升，7000+20=7020（毫升）", "isCorrect": false },
                        { "text": "7020 毫升", "rationale": "正確！7公升＝7000毫升，7000+20=7020（毫升）", "isCorrect": true },
                        { "text": "7200 毫升", "rationale": "不對喔。7公升＝7000毫升，7000+20=7020（毫升）", "isCorrect": false },
                        { "text": "70020 毫升", "rationale": "不對喔。7公升＝7000毫升，7000+20=7020（毫升）", "isCorrect": false }
                    ]
                },
                {
                    "question": "【第五題】8 公升 10 毫升等於多少毫升？",
                    "options": [
                        { "text": "810 毫升", "rationale": "不對喔。8公升＝8000毫升，8000+10=8010（毫升）", "isCorrect": false },
                        { "text": "8100 毫升", "rationale": "不對喔。8公升＝8000毫升，8000+10=8010（毫升）", "isCorrect": false },
                        { "text": "8010 毫升", "rationale": "正確！8公升＝8000毫升，8000+10=8010（毫升）", "isCorrect": true },
                        { "text": "80010 毫升", "rationale": "不對喔。8公升＝8000毫升，8000+10=8010（毫升）", "isCorrect": false }
                    ]
                }
            ]
        };

        let currentIdx = 0;
        let score = 0;
        let answered = false;
        const alphabet = ['A', 'B', 'C', 'D'];

        const startPage = document.getElementById('start-page');
        const quizPage = document.getElementById('quiz-page');
        const resultScreen = document.getElementById('result-screen');
        
        const qText = document.getElementById('question-text');
        const optionsBox = document.getElementById('options-container');
        const qNum = document.getElementById('question-number');
        const scoreDisp = document.getElementById('score-display');
        const progressBar = document.getElementById('progress-bar');
        const feedback = document.getElementById('feedback');
        const feedbackText = document.getElementById('feedback-text');
        const rationaleText = document.getElementById('rationale-text');
        
        const startBtn = document.getElementById('start-btn');
        const nextBtn = document.getElementById('next-btn');
        const restartBtn = document.getElementById('restart-btn');

        // 開始按鈕點擊事件
        startBtn.onclick = () => {
            startPage.classList.add('hidden');
            quizPage.classList.remove('hidden');
            loadQuestion();
        };

        function loadQuestion() {
            answered = false;
            feedback.classList.add('hidden');
            const q = quizData.questions[currentIdx];
            
            qNum.innerText = `第 ${currentIdx + 1} 題 / ${quizData.questions.length}`;
            qText.innerText = q.question;
            progressBar.style.width = `${((currentIdx) / quizData.questions.length) * 100}%`;
            
            nextBtn.innerText = (currentIdx === quizData.questions.length - 1) ? "查看結果" : "下一題";

            optionsBox.innerHTML = '';
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-left p-4 border-2 border-gray-200 rounded-xl hover:border-blue-400 hover:bg-blue-50 font-medium text-gray-700 flex items-center";
                btn.innerHTML = `<span class="option-prefix">${alphabet[index]}</span><span>${opt.text}</span>`;
                btn.onclick = () => selectOption(btn, opt);
                optionsBox.appendChild(btn);
            });
        }

        function selectOption(btn, opt) {
            if (answered) return;
            answered = true;

            const allBtns = optionsBox.querySelectorAll('.option-btn');
            if (opt.isCorrect) {
                btn.classList.add('correct');
                score += (100 / quizData.questions.length);
                feedbackText.innerText = "✨ 太棒了！答對了";
                feedbackText.className = "font-bold text-green-600 text-lg";
                scoreDisp.innerText = `得分: ${Math.round(score)}`;
            } else {
                btn.classList.add('wrong');
                feedbackText.innerText = "❌ 再接再厲！答錯了";
                feedbackText.className = "font-bold text-red-600 text-lg";
                const correctIdx = quizData.questions[currentIdx].options.findIndex(o => o.isCorrect);
                allBtns[correctIdx].classList.add('correct');
            }

            // 處理換行顯示 (將Rationale中的逗號或句號後方加入換行感)
            rationaleText.innerHTML = opt.rationale.replace('，', '<br>');
            feedback.classList.remove('hidden');
        }

        nextBtn.onclick = () => {
            currentIdx++;
            if (currentIdx < quizData.questions.length) {
                loadQuestion();
            } else {
                showResult();
            }
        };

        restartBtn.onclick = () => {
            currentIdx = 0;
            score = 0;
            scoreDisp.innerText = "得分: 0";
            resultScreen.classList.add('hidden');
            startPage.classList.remove('hidden');
        };

        function showResult() {
            quizPage.classList.add('hidden');
            progressBar.style.width = "100%";
            resultScreen.classList.remove('hidden');
            document.getElementById('final-score').innerText = Math.round(score);
            
            let msg = score === 100 ? "你是容量大師！全對！" : score >= 60 ? "表現不錯，再多練習幾次會更好。" : "別灰心，重新複習一下 L 和 mL 的關係吧！";
            document.getElementById('result-message').innerText = msg;
        }
    </script>
</body>
</html>
